name: Deploy to GitHub Pages

# main への push で自動ビルド＆ gh-pages 公開（手元のデプロイ忘れを防ぐ）。
# 手動実行（workflow_dispatch）も可能。
on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN に gh-pages ブランチへの push 権限を付与
permissions:
  contents: write

# 同時実行を1本に絞り、古いデプロイは打ち切る
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
